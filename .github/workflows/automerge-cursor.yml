name: Auto-merge Cursor PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    name: Enable auto-merge
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for Cursor-authored PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          author="$(gh pr view "$PR_URL" --json author --jq '.author.login')"
          echo "PR author: $author"

          case "$author" in
            app/cursor|cursor|"cursor[bot]")
              gh pr merge "$PR_URL" --auto --squash
              ;;
            *)
              echo "Not a Cursor-authored PR; skipping."
              ;;
          esac
