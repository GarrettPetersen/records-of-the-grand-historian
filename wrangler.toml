# Cloudflare Pages — Git builds do NOT infer a build command from this file.
# You must set these in the Pages dashboard (Settings → Builds):
#   Build command:  npm run build
#   Build output:   public
# If Build command is left blank, Cloudflare skips npm entirely and only uploads
# committed files under `public/` — no manifest/sync/static regen, no OG PNGs.
#
# OG share cards (generate-og-images.js): `npm run build` uses --incremental so
# existing PNGs newer than their source JSON are skipped when those files are
# still present in the workspace.
#
# Cloudflare Pages still clones the repo fresh each build; Build caching (beta)
# restores a *separate* cache (see https://developers.cloudflare.com/pages/configuration/build-caching/).
# Official docs only list framework-specific paths (e.g. Next .next/cache, Gatsby .cache+public)
# and package-manager caches (.npm, etc.). This project is not in that framework table, so
# public/og may NOT be restored between builds—incremental may only help npm install time
# unless Cloudflare expands detection or you use another strategy (e.g. R2 upload, committed
# assets, or a worker/build step that preserves artifacts).
#
# After changing OG layout/fonts, use OG_FORCE=1 or --force once, or clear the build cache.
# Optional: set OG_CHAPTER_CONCURRENCY / STATIC_GEN_CONCURRENCY in Pages → Environment
# variables to pin parallelism. If unset, build scripts default from Node's reported
# logical thread count (see scripts/build-parallelism.mjs).
name = "records-of-the-grand-historian"
pages_build_output_dir = "public"
